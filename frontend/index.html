<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cashback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Calculadora de Cashback</h1>
            <p class="subtitle">
                Calcule o cashback de uma compra com base no tipo de cliente e nas regras da promoção.
            </p>

            <form id="cashbackForm">
                <label for="customerType">Tipo de cliente</label>
                <select id="customerType" required>
                    <option value="normal">Normal</option>
                    <option value="vip">VIP</option>
                </select>

                <label for="purchaseValue">Valor da compra</label>
                <input 
                    type="number" 
                    id="purchaseValue" 
                    placeholder="Ex: 600"
                    min="0"
                    step="0.01"
                    required
                >

                <label for="discountPercentage">Desconto (%)</label>
                <input 
                    type="number" 
                    id="discountPercentage" 
                    placeholder="Ex: 20"
                    min="0"
                    max="100"
                    step="0.01"
                    value="0"
                >

                <button type="submit">Calcular cashback</button>
            </form>

            <div id="result" class="result hidden"></div>
        </section>

        <section class="card">
            <h2>Meu histórico</h2>
            <p class="subtitle">
                Histórico de consultas feitas pelo seu IP.
            </p>

            <div id="historyList" class="history-list">
                <p>Nenhuma consulta encontrada.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
